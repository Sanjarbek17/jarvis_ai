services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "8111:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*

  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: whisper
    ports:
      - "8000:8000"
    volumes:
      - ./whisper_models:/root/.cache/huggingface
    restart: unless-stopped
